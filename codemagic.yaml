# codemagic.yaml
# Configuration guide: https://docs.codemagic.io/yaml-basic/yaml-getting-started/

workflows:
  ios-release:
    name: iOS App Store Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      groups:
        - app-store-credentials
      vars:
        APP_ID: "6470000000"
      flutter: stable
      xcode: latest
      cocoapods: default

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true

    scripts:
      - name: Set up Apple API & Code Signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "com.susingroup.app" --type IOS_APP_STORE --create
          keychain add-certificates

      - name: Fetch Flutter dependencies
        script: |
          flutter pub get

      - name: Build iOS IPA Package
        script: |
          flutter build ipa \
            --export-method app-store \
            --build-name=1.0.0 \
            --build-number=$BUILD_NUMBER

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      email:
        recipients:
          - admin@susingroup.com
        on_failure: true
        on_success: true
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers
